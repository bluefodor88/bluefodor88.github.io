<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password - The Activity Hub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: Inter, sans-serif;
      background: #FAF9F6;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      color: #333;
    }
    .card {
      background: #fff;
      border-radius: 16px;
      padding: 32px 24px;
      max-width: 420px;
      width: 100%;
      text-align: center;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
    }
    .logo {
      font-size: 28px;
      font-weight: 800;
      font-style: italic;
      margin-bottom: 8px;
    }
    .logo .yellow { color: #FFCF56; }
    .logo .orange { color: #FF8C42; }
    .underline {
      width: 60px;
      height: 3px;
      background: #FF8C42;
      border-radius: 2px;
      margin: 0 auto 24px;
    }
    h1 {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 12px;
    }
    p {
      font-size: 15px;
      line-height: 1.5;
      color: #666;
      margin-bottom: 20px;
    }
    button {
      background: #FF8C42;
      color: #fff;
      border: none;
      border-radius: 12px;
      padding: 14px 24px;
      font-size: 16px;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      width: 100%;
    }
    .hint {
      margin-top: 16px;
      font-size: 13px;
      color: #888;
    }
    .error {
      color: #C62828;
      font-size: 14px;
      margin-bottom: 16px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <span class="yellow">The</span><span class="orange">Activity</span><span class="yellow">Hub</span>
    </div>
    <div class="underline"></div>
    <h1 id="title">Opening the app…</h1>
    <p id="message">We are sending you to The Activity Hub so you can choose a new password.</p>
    <p id="error" class="error" hidden></p>
    <button id="open-app" type="button">Open The Activity Hub</button>
    <p class="hint">Open this link on the phone where The Activity Hub is installed. Desktop browsers cannot complete password reset.</p>
  </div>
  <script>
    (function () {
      var APP_SCHEME = 'activeportland';
      var APP_PATH = 'reset-password';
      var params = new URLSearchParams(window.location.search);
      var hash = window.location.hash || '';

      if (params.get('error') || params.get('error_description')) {
        document.getElementById('title').textContent = 'Reset link problem';
        document.getElementById('message').textContent =
          params.get('error_description') || params.get('error') || 'This reset link is invalid or expired.';
        document.getElementById('error').hidden = true;
        document.getElementById('open-app').textContent = 'Request a new link in the app';
        document.getElementById('open-app').onclick = function () {
          window.location.href = APP_SCHEME + '://' + APP_PATH;
        };
        return;
      }

      var hasAuthPayload =
        hash.indexOf('access_token=') !== -1 ||
        params.has('code') ||
        params.has('token_hash');

      if (!hasAuthPayload) {
        document.getElementById('title').textContent = 'Open on your phone';
        document.getElementById('message').textContent =
          'Tap the button below on the device where The Activity Hub is installed.';
      }

      function buildAppUrl() {
        return APP_SCHEME + '://' + APP_PATH + window.location.search + hash;
      }

      document.getElementById('open-app').onclick = function () {
        window.location.href = buildAppUrl();
      };

      if (hasAuthPayload) {
        window.setTimeout(function () {
          window.location.href = buildAppUrl();
        }, 300);
      }
    })();
  </script>
</body>
</html>
